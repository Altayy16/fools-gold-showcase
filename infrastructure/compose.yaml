services:
    web:
        image: nginx:alpine
        ports:
            - '${APP_PORT:-80}:80'
        volumes:
            - '.:/var/www/html'
            - './docker/nginx/default.conf:/etc/nginx/conf.d/default.conf'
        networks:
            - sail
        depends_on:
            - app

    app:
        build:
            context: ./docker/php
            dockerfile: Dockerfile
        volumes:
            - '.:/var/www/html'
            - './docker/php/www.conf:/usr/local/etc/php-fpm.d/zz-custom.conf'
        networks:
            - sail
        depends_on:
            - mysql
            - redis

    mysql:
        image: 'mysql:8.4'
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
        volumes:
            - 'sail-mysql:/var/lib/mysql'
        networks:
            - sail

    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail

    queue:
        build:
            context: ./docker/php
            dockerfile: Dockerfile
        command: php artisan queue:work --tries=3 --timeout=90
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - redis
            - mysql

    reverb:
        build:
            context: ./docker/php
            dockerfile: Dockerfile
        command: php artisan reverb:start --host=0.0.0.0 --port=8080
        volumes:
            - '.:/var/www/html'
        ports:
            - '${REVERB_PORT:-8080}:${REVERB_PORT:-8080}'
        networks:
            - sail
        depends_on:
            - redis
            - mysql
    npm:
        image: node:22-alpine
        volumes:
            - '.:/var/www/html'
        working_dir: /var/www/html
        entrypoint: ['npm']
        networks:
            - sail

networks:
    sail:
        driver: bridge
volumes:
    sail-mysql:
        driver: local
    sail-redis:
        driver: local
